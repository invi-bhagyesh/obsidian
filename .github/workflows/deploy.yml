name: Deploy Quartz + viz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ----- Quartz (root package) -----
      - name: Install Quartz deps
        run: npm ci
      - name: Build Quartz
        run: npx quartz build -d Notes

      # ----- Interactive viz (viz/ subpackage) -----
      - name: Install viz deps
        working-directory: viz
        run: npm ci
      - name: Build viz
        working-directory: viz
        run: npm run build
      - name: Merge viz build into public/
        run: |
          mkdir -p public/interactive
          cp -R viz/dist/. public/interactive/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
